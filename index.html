<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anonymous Demo Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
    }
    h1, h2 {
      margin-top: 1.2em;
    }
    .sample-block {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 16px;
      margin: 20px 0;
    }
    .audio-row {
      margin: 12px 0;
    }
    .label {
      font-weight: bold;
      display: inline-block;
      width: 140px;
      vertical-align: top;
    }
    audio {
      width: 70%;
      vertical-align: middle;
    }
    .note {
      background: #f7f7f7;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <h1>Anonymous Demo for Interspeech 2026 Submission</h1>

  <p>
    This page provides representative long-form dialogue samples for anonymous review.
    We compare GRPO and RankDPO using the same prompts.
  </p>

  <h2>GRPO vs RankDPO</h2>

  <div class="sample-block">
    <div class="note"><strong>Sample 1</strong></div>

    <div class="audio-row">
      <span class="label">GRPO</span>
      <audio controls src="samples/grpo-1.wav"></audio>
    </div>

    <div class="audio-row">
      <span class="label">RankDPO</span>
      <audio controls src="samples/rank-1.wav"></audio>
    </div>
  </div>

  <div class="sample-block">
    <div class="note"><strong>Sample 2</strong></div>

    <div class="audio-row">
      <span class="label">GRPO</span>
      <audio controls src="samples/grpo-2.wav"></audio>
    </div>

    <div class="audio-row">
      <span class="label">RankDPO</span>
      <audio controls src="samples/rank-2.wav"></audio>
    </div>
  </div>
</body>
</html>
